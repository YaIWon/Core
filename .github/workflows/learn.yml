name: Continuous Learning

on:
  push:
    branches: [main]
    paths:
      - 'training_data/**'
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  workflow_dispatch:

jobs:
  learn:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build
      run: cargo build --release
    
    - name: Run learning process
      run: |
        mkdir -p data/vectors data/blockchain
        cargo run --release --bin self_evolving_lm &
        sleep 10
        kill $! || true
    
    - name: Commit learned data
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add data/ vectors/ blockchain.json 2>/dev/null || true
        git diff --staged --quiet || git commit -m "Auto-learn: $(date -u +'%Y-%m-%d %H:%M:%S')"
        git push || true
